<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MN-DEN Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes pulse-teal {
            0% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(45, 212, 191, 0); }
            100% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0); }
        }
        .recording-pulse { animation: pulse-teal 1.5s infinite; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-gray-100 min-h-screen flex items-center justify-center font-sans p-6">

    <div class="glass rounded-3xl p-8 shadow-2xl w-full max-w-sm flex flex-col items-center gap-8">
        
        <div class="text-center">
            <h1 class="text-xl font-semibold text-white tracking-tight">Voice Box</h1>
            <p id="status-text" class="text-xs text-cyan-400 uppercase tracking-widest mt-1">Ready to Record</p>
        </div>

        <div class="relative flex flex-col items-center justify-center w-full gap-8">
            
            <div id="record-state" class="flex flex-col items-center">
                <div id="status-ring" class="absolute w-32 h-32 rounded-full border-2 border-transparent transition-all duration-300"></div>
                <button id="record-btn" class="relative group w-28 h-28 rounded-full bg-gray-800 flex items-center justify-center border-4 border-gray-700 active:scale-95 transition-all cursor-pointer hover:border-red-500/50">
                    <div id="record-icon" class="w-6 h-6 bg-red-500 rounded-full transition-all"></div>
                </button>
                <p id="instruction-text" class="text-sm text-gray-500 mt-6 text-center">Tap to start recording</p>
            </div>

            <div id="review-state" class="hidden flex flex-col items-center w-full gap-6">
                <button id="play-btn" class="w-20 h-20 rounded-full bg-cyan-500 text-black flex items-center justify-center shadow-lg shadow-cyan-500/20 hover:scale-105 active:scale-95 transition-all">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>

                <div class="flex items-center gap-4 w-full">
                    <button id="redo-btn" class="flex-1 py-3 rounded-xl bg-gray-800 text-gray-300 font-medium hover:bg-gray-700 transition-all">
                        Re-record
                    </button>
                    <button id="send-btn" class="flex-1 py-3 rounded-xl bg-white text-black font-bold hover:bg-cyan-400 transition-all">
                        Send to Box
                    </button>
                </div>
            </div>

        </div>

        <audio id="audio-player"></audio>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getDatabase, ref as dRef, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBEgYf9DxBVeyjp1z4JAYHbJxoV9t4AS24",
        authDomain: "voicebox-87565.firebaseapp.com",
        databaseURL: "https://voicebox-87565-default-rtdb.firebaseio.com",
        projectId: "voicebox-87565",
        storageBucket: "voicebox-87565.firebasestorage.app",
        messagingSenderId: "1062950545372",
        appId: "1:1062950545372:web:f6ba217503546b6c861119",
        measurementId: "G-ZTV9Z9H2XV"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    const database = getDatabase(app);

    let mediaRecorder;
    let audioChunks = [];
    let audioBlob = null;
    let isRecording = false; // Track recording state

    const recordBtn = document.getElementById('record-btn');
    const recordIcon = document.getElementById('record-icon');
    const instructionText = document.getElementById('instruction-text');
    const statusRing = document.getElementById('status-ring');
    
    const playBtn = document.getElementById('play-btn');
    const redoBtn = document.getElementById('redo-btn');
    const sendBtn = document.getElementById('send-btn');
    
    const recordState = document.getElementById('record-state');
    const reviewState = document.getElementById('review-state');
    const statusText = document.getElementById('status-text');
    const audioPlayer = document.getElementById('audio-player');

    // MOBILE TOGGLE LOGIC
    recordBtn.onclick = async () => {
        if (!isRecording) {
            // START RECORDING
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioPlayer.src = URL.createObjectURL(audioBlob);
                    
                    recordState.classList.add('hidden');
                    reviewState.classList.remove('hidden');
                    statusText.innerText = "Review Message";
                };

                mediaRecorder.start();
                isRecording = true;
                
                // UI Changes
                statusRing.classList.add('recording-pulse');
                recordIcon.classList.remove('rounded-full');
                recordIcon.classList.add('rounded-sm'); // Turns circle into square
                statusText.innerText = "Recording...";
                instructionText.innerText = "Tap again to stop";
            } catch (err) {
                statusText.innerText = "Mic Error: " + err.message;
            }
        } else {
            // STOP RECORDING
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                isRecording = false;
                statusRing.classList.remove('recording-pulse');
                recordIcon.classList.add('rounded-full');
                recordIcon.classList.remove('rounded-sm');
            }
        }
    };

    // PLAYBACK
    playBtn.onclick = () => {
        audioPlayer.play();
        statusText.innerText = "Playing back...";
        audioPlayer.onended = () => { statusText.innerText = "Review Message"; };
    };

    // RE-RECORD
    redoBtn.onclick = () => {
        reviewState.classList.add('hidden');
        recordState.classList.remove('hidden');
        statusText.innerText = "Ready to Record";
        instructionText.innerText = "Tap to start recording";
        audioBlob = null;
        isRecording = false;
    };

    // SEND TO BOX
    sendBtn.onclick = async () => {
        statusText.innerText = "Sending to Box...";
        sendBtn.disabled = true;
        
        try {
            const storageRef = sRef(storage, 'voice_notes/message.wav');
            await uploadBytes(storageRef, audioBlob);
            
            const url = await getDownloadURL(storageRef);
            
            await set(dRef(database, 'denver_alert'), {
                audioUrl: url,
                time: Date.now()
            });

            statusText.innerText = "Delivered!";
            setTimeout(() => {
                sendBtn.disabled = false;
                redoBtn.click();
            }, 2000);
        } catch (err) {
            console.error(err);
            statusText.innerText = "Upload Failed!";
            sendBtn.disabled = false;
        }
    };
</script>
</body>
</html>
